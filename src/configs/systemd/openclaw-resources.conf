[Service]
# Gateway resource limits — mitigates known memory leak (issue #13758)
# Gateway reaches 1.9GB RSS and 70% CPU after ~13 hours of continuous operation.

# Soft limit: system starts actively reclaiming memory
MemoryHigh=1536M

# Hard limit: process is OOM-killed and restarted if exceeded
MemoryMax=2G

# CPU quota: 150% = 1.5 cores maximum
CPUQuota=150%

# Maximum number of tasks (threads/processes) spawned by the service
TasksMax=100
